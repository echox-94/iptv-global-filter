name: Daily Playlist Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 🔑 Key configuration: explicitly grant write permissions at the workflow level
permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Uses the default GITHUB_TOKEN, now with write permissions
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Generate filtered playlist
        run: |
          python generate_channels_m3u.py --source https://iptv-org.github.io/iptv/index.m3u --allow allowlist.txt --out playlist.m3u

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add playlist.m3u
          git diff --staged --quiet || git commit -m "Automated playlist update [skip ci]"
          git push
